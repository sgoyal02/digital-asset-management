version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres_db

    env_file:
      - ./postgres.env

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ./minio.env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file:
      - ./rabbitmq.env
    ports:
      - "5672:5672"    #app-connect
      - "15672:15672"  #ui
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: api
    ports:
      - "5000:5000"
    environment:
      CI: "true"
    env_file:
      - ../apps/api/.env
    depends_on:
      - postgres
      - minio
      - rabbitmq
    volumes:
      - ..:/app
      - /app/node_modules
    command: sh -c "cd apps/api && pnpm install && pnpm exec prisma migrate dev && pnpm dev"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: web
    ports:
      - "5173:5173"
    environment:
      CI: "true"
    env_file:
      - ../apps/web/.env
    depends_on:
      - api
    volumes:
      - ..:/app
      - /app/node_modules

volumes:
  postgres_data:
  minio_data:
  rabbitmq_data: